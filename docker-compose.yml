services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hopledger
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: hopledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hopledger"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    #image: ghcr.io/haertibraeu/hopledger-backend:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://hopledger:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/hopledger?schema=public
      PORT: 3000
      API_KEY: ${API_KEY}
      SHOW_LOCATIONS: ${SHOW_LOCATIONS:-true}
      WEBDAV_URL: ${WEBDAV_URL}
      WEBDAV_USER: ${WEBDAV_USER}
      WEBDAV_PASS: ${WEBDAV_PASS}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
